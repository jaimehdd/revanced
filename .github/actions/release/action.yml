name: Releasing APK files
inputs:
  github_token:
    description: "GitHub Token"
    required: true
runs:
  using: "composite"
  steps:
    - name: Check for files to release
      shell: bash
      run: |
        if ls ./release/*.apk >/dev/null 2>&1; then
          echo "has_files=true" >> $GITHUB_ENV
        else
          echo "has_files=false" >> $GITHUB_ENV
        fi

    - name: Generate release info
      if: env.has_files == 'true'
      shell: bash
      run: |
        echo "
        **Change log** :point_down:
        [Morphe](https://github.com/MorpheApp/morphe-patches/releases)
        [De-ReVanced](https://github.com/RookieEnough/De-ReVanced/releases)
        [hoo-dles](https://github.com/hoo-dles/morphe-patches/releases)
        [brosssh](https://github.com/brosssh/morphe-patches/releases)
        [piko](https://github.com/crimera/piko/releases)
        "> ${{ github.workspace }}-CHANGELOG.txt

    - name: Release
      if: env.has_files == 'true'
      uses: ncipollo/release-action@v1.21.0
      with:
        artifacts: |
          ./release/*.apk
        name: ${{ env.APP_NAME }}-${{ env.VARIANT }}-${{ env.APP_VERSION }}-${{ env.patch_version }}
        token: ${{ inputs.github_token }}
        tag: ${{ env.APP_NAME }}-${{ env.VARIANT }}-${{ env.APP_VERSION }}-${{ env.patch_version }}
        bodyFile: ${{ github.workspace }}-CHANGELOG.txt
        allowUpdates: true

    - name: Cleanup old releases
      if: env.has_files == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        APP_PREFIX="${APP_NAME}-${VARIANT}-"
        KEEP_COUNT=2

        echo "Cleaning up old releases for: $APP_PREFIX (keeping $KEEP_COUNT)"

        # Get all releases matching this app prefix, sorted by semantic version desc
        releases=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName,name \
          | jq -r --arg prefix "$APP_PREFIX" '.[] | select(.name | startswith($prefix)) | .tagName' \
          | sed 's/-dev/~dev/g' \
          | sort -V -r \
          | sed 's/~dev/-dev/g')

        # Count and delete old releases
        count=0
        for tag in $releases; do
          count=$((count + 1))
          if [ $count -gt $KEEP_COUNT ]; then
            echo "Deleting old release: $tag"
            gh release delete "$tag" --repo ${{ github.repository }} --yes --cleanup-tag || true
          fi
        done

        echo "Cleanup complete. Kept $KEEP_COUNT most recent releases for $APP_PREFIX"
