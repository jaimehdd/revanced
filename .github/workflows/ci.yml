name: Check new patch
permissions: write-all
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 10,22 * * *"
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Do not change value below'
        required: false
        default: '1'
jobs:
  check:
    name: Check new patch
    runs-on: ubuntu-latest
    env:
      repository: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Check github connection
        id: check-gh
        run: bash src/etc/connection.sh
      - name: Check new patch Morphe
        id: check-morphe
        if: steps.check-gh.outputs.internet_error == '0'
        run: bash src/etc/ci.sh MorpheApp/morphe-patches latest youtube.*morphe.*apk
      - name: Check new patch Morphe Community
        id: check-morphe-community
        if: steps.check-gh.outputs.internet_error == '0'
        run: bash src/etc/ci.sh hoo-dles/morphe-patches latest windy.*hoo-dles.*apk
      - name: Check new patch Morphe Beta
        id: check-morphe-beta
        if: steps.check-gh.outputs.internet_error == '0'
        run: bash src/etc/ci.sh MorpheApp/morphe-patches latest youtube-beta.*morphe.*apk
      - name: Re-run workflow if github connection not stable
        if: always() && steps.check-morphe.outcome == 'skipped' && env.retry_count < env.max_retries
        uses: actions/github-script@v9
        with:
          script: |
            const maxRetries = ${{ env.max_retries }};
            let retryCount = ${{ env.retry_count }};
            if (retryCount < maxRetries) {
              retryCount += 1;
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                ref: context.ref,
                inputs: {
                  'retry_count': String(retryCount)
                }
              });
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          retry_count: ${{ github.event.inputs.retry_count }}
          max_retries: 3
    outputs:
      check_morphe: ${{ steps.check-morphe.outputs.new_patch }}
      check_morphe_community: ${{ steps.check-morphe-community.outputs.new_patch }}
      check_morphe_beta: ${{ steps.check-morphe-beta.outputs.new_patch }}

  Patch-Morphe:
    name: Patch Morphe
    needs: check
    if: ${{ needs.check.outputs.check_morphe == 1 }}
    uses: ./.github/workflows/manual-patch.yml
    secrets: inherit
    with:
      org: "Morphe"
  Patch-Morphe-Community:
    name: Patch Morphe Community
    needs: check
    if: ${{ needs.check.outputs.check_morphe_community == 1 }}
    uses: ./.github/workflows/manual-patch.yml
    secrets: inherit
    with:
      org: "Morphe-Community"
  Patch-Morphe-Beta:
    name: Patch Morphe Beta
    needs: check
    if: ${{ needs.check.outputs.check_morphe_beta == 1 }}
    uses: ./.github/workflows/manual-patch.yml
    secrets: inherit
    with:
      org: "Morphe-Beta"
