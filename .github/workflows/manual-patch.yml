name: Manual Patch
permissions: write-all
env:
  repository: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  org_input: ${{ inputs.org }}
  org_event_input: ${{ github.event.inputs.org }}
  force_patch: ${{ inputs.force_patch || false }}
on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Which "Revanced" do you want to patch?'
        required: true
        default: "Morphe"
        type: choice
        options:
          - "Morphe-Community"
          - "Morphe"
          - "Xposed"
      use_beta:
        description: "Use beta versions"
        required: false
        default: false
        type: boolean
      force_patch:
        description: "Force patch even if release already has APK assets"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      org:
        required: true
        type: string
      use_beta:
        description: "Use beta versions"
        required: false
        type: boolean
        default: false
      force_patch:
        description: "Force patch even if release already has APK assets"
        required: false
        type: boolean
        default: false
jobs:
  patch_morphe:
    name: Patch Morphe
    if: ${{ github.event.inputs.org == 'Morphe' || inputs.org == 'Morphe' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [youtube, reddit, youtube-music]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Preparing to patch
        uses: ./.github/actions/preparing
      - name: Check github connection
        id: check-gh-morphe
        run: bash src/etc/connection.sh
      - name: Check stable experimental support versions
        id: experimental-check
        if: steps.check-gh-morphe.outputs.internet_error == '0'
        uses: ./.github/actions/experimental-check
        with:
          release_channel: stable
      - name: Patch apk
        id: patch-morphe
        if: steps.check-gh-morphe.outputs.internet_error == '0'
        env:
          use_beta: ${{ inputs.use_beta }}
          youtube_experimental_support: ${{ steps.experimental-check.outputs.youtube_experimental_support }}
          youtube_music_experimental_support: ${{ steps.experimental-check.outputs.youtube_music_experimental_support }}
          reddit_experimental_support: ${{ steps.experimental-check.outputs.reddit_experimental_support }}
        run: bash src/build/morphe.sh ${{ matrix.run }}
      - name: Releasing APK files
        id: release-morphe
        if: steps.check-gh-morphe.outputs.internet_error == '0'
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
  patch_community:
    name: Patch Morphe Community
    if: ${{ github.event.inputs.org == 'Morphe-Community' || inputs.org == 'Morphe-Community' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [photos, instagram-piko, messenger, strava, komoot, fotmob, windy, moonreader, adguard]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Preparing to patch
        uses: ./.github/actions/preparing
      - name: Check github connection
        id: check-gh-derv
        run: bash src/etc/connection.sh
      - name: Patch apk
        id: patch-derv
        if: steps.check-gh-derv.outputs.internet_error == '0'
        env:
          use_beta: ${{ inputs.use_beta }}
        run: bash src/build/morphe-community.sh ${{ matrix.run }}
      - name: Releasing APK files
        id: release-derv
        if: steps.check-gh-derv.outputs.internet_error == '0'
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
  patch_xposed:
    name: Patch Xposed
    if: ${{ github.event.inputs.org == 'Xposed' || inputs.org == 'Xposed' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [facebook, messenger]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Preparing to patch
        uses: ./.github/actions/preparing
        with:
          install_bouncy_castle: 'true'
      - name: Check github connection
        id: check-gh-xposed
        run: bash src/etc/connection.sh
      - name: Patch apk
        id: patch-xposed
        if: steps.check-gh-xposed.outputs.internet_error == '0'
        env:
          use_beta: ${{ inputs.use_beta }}
        run: bash src/build/Xposed.sh ${{ matrix.run }}
      - name: Releasing APK files
        id: release-xposed
        if: steps.check-gh-xposed.outputs.internet_error == '0'
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
